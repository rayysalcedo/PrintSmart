<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | PrintSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f6f5f7; display: flex; justify-content: center; align-items: center; font-family: 'Alexandria', sans-serif; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 40px 50px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 400px; max-width: 90%; }
        h1 { color: #DC5500; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        input { background-color: #f0f0f0; border: none; padding: 14px; width: 100%; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 14px; margin-bottom: 15px;}
        input:focus { outline: 1px solid #DC5500; background: #fff; }
        button { border-radius: 50px; border: none; background-color: #DC5500; color: #FFFFFF; font-size: 14px; font-weight: 700; padding: 15px 50px; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s;}
        button:hover { background-color: #b84700; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>New Password</h1>
        <p>Please create a strong new password for your account.</p>
        <form action="/reset_password/{{ token }}" method="POST">
            <input type="password" name="password" placeholder="New Password" 
                   pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" 
                   title="Must be at least 8 characters, contain 1 uppercase, 1 number, and 1 special character." required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>
</html>
