<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PrintSmart</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .brand { color: #ff6600; font-size: 24px; font-weight: bold; margin-bottom: 30px; display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff6600; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #e65c00; }
        .footer-links { margin-top: 20px; font-size: 14px; }
        .footer-links a { color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="brand">PrintSmart Login</span>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <div class="footer-links">
            <a href="/">Back to Home</a>
        </div>
    </div>
</body>
</html>
