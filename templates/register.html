<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PrintSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    
    <style>
        /* Your Original CSS (Unchanged) */
        body { background: #f6f5f7; display: flex; justify-content: center; align-items: center; font-family: 'Alexandria', sans-serif; height: 100vh; margin: 0; }
        
        .container {
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            width: 1200px;
            max-width: 95%;
            min-height: 750px;
            display: flex;
        }
        
        /* LEFT PANEL (Orange) */
        .overlay-container { flex: 1; background: linear-gradient(135deg, #FF8C42 0%, #DC5500 100%); color: #ffffff; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 50px; text-align: center; position: relative; }
        .logo-area { position: absolute; top: 40px; left: 40px; display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 45px; filter: brightness(0) invert(1); }
        .logo-text { font-weight: 700; font-size: 22px; letter-spacing: 1px; }
        .overlay-panel h1 { font-weight: 700; margin: 0 0 15px 0; font-size: 42px; }
        .overlay-panel p { font-size: 18px; line-height: 1.6; margin: 0 0 40px 0; opacity: 0.9; }
        button.ghost { background-color: transparent; border: 2px solid white; color: white; padding: 15px 55px; font-size: 16px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button.ghost:hover { background-color: rgba(255,255,255,0.2); }

        /* RIGHT PANEL (Form) */
        .form-container { flex: 1.5; padding: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow-y: auto; }
        .form-container h1 { font-weight: 700; margin: 0 0 25px 0; color: #DC5500; font-size: 36px; }
        .input-group { width: 100%; margin: 10px 0; text-align: left; }
        .input-group label { font-size: 14px; font-weight: 600; color: #666; margin-left: 5px; display:block; margin-bottom: 5px; }
        input { background-color: #f0f0f0; border: none; padding: 18px; width: 100%; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 16px; }
        input:focus { outline: 1px solid #DC5500; background: #fff; }
        
        .password-container { position: relative; width: 100%; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; font-size: 18px; }
        .toggle-password:hover { color: #DC5500; }

        button.primary { border-radius: 50px; border: none; background-color: #DC5500; color: #FFFFFF; font-size: 16px; font-weight: 700; padding: 18px 50px; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; cursor: pointer; margin-top: 25px; width: 100%; }
        button.primary:hover { background-color: #b84700; }
        .divider { margin: 25px 0; font-size: 14px; color: #aaa; width: 100%; border-bottom: 1px solid #eee; line-height: 0.1em; }
        .divider span { background:#fff; padding:0 10px; }
        .social-container a { border: 1px solid #ddd; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin: 0 8px; height: 50px; width: 50px; text-decoration: none; transition: 0.3s; }
        .social-container a:hover { border-color: #DC5500; background: #fff5e6; }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; width: 95%; }
            .overlay-container { padding: 40px 20px; }
            .form-container { padding: 40px 20px; }
        }

        /* VALIDATION RULES CSS */
        .validation-box { text-align: left; width: 100%; margin-top: 5px; font-size: 12px; color: #666; background: #fff; padding: 10px; border-radius: 8px; display: none; }
        .validation-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .validation-item i { font-size: 12px; color: #ccc; }
        .validation-item.valid { color: #2e7d32; }
        .validation-item.valid i { color: #2e7d32; }
        #match-error { color: #c62828; font-size: 12px; margin-top: 5px; display: none; margin-left: 5px; font-weight: 600; }

        /* 2. ADDED: Fix for Phone Input width */
        .iti { width: 100%; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="overlay-container">
        <div class="logo-area">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
            <span class="logo-text">PRINTAGRAM</span>
        </div>
        <div class="overlay-panel">
            <h1>Welcome Back!</h1>
            <p>To keep connected with us please login with your personal info</p>
            <a href="{{ url_for('login') }}">
                <button class="ghost">Sign In</button>
            </a>
        </div>
    </div>

    <div class="form-container">
        <form action="/register" method="POST" style="width: 100%; max-width: 450px;" onsubmit="return validateForm()">
            <h1>Create Account</h1>
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone_register" name="phone" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-container">
                    <input type="password" id="regPass" name="password" placeholder="Password" required onkeyup="checkPassword()" onfocus="showValidation()">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('regPass', this)"></i>
                </div>
                
                <div class="validation-box" id="validationBox">
                    <div class="validation-item" id="rule-length"><i class="fa-solid fa-circle-check"></i> At least 8 characters</div>
                    <div class="validation-item" id="rule-upper"><i class="fa-solid fa-circle-check"></i> At least 1 uppercase letter</div>
                    <div class="validation-item" id="rule-number"><i class="fa-solid fa-circle-check"></i> At least 1 number</div>
                    <div class="validation-item" id="rule-special"><i class="fa-solid fa-circle-check"></i> At least 1 special character (!@#$...)</div>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-container">
                    <input type="password" id="confirmPass" name="confirm_password" placeholder="Re-type Password" required onkeyup="checkPassword()">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirmPass', this)"></i>
                </div>
                <div id="match-error"><i class="fa-solid fa-circle-exclamation"></i> Passwords do not match</div>
            </div>
            
            <button type="submit" class="primary" id="submitBtn" disabled style="opacity: 0.6; cursor: not-allowed;">Sign Up</button>

            <div class="divider"><span>or continue with</span></div>

           <div class="social-container">
                <a href="{{ url_for('google_login') }}">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="24" alt="Google">
                </a>
                
                <a href="{{ url_for('facebook_login') }}">
                    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png" width="24" alt="Facebook">
                </a>
            </div>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
<script>
    // Initialize the phone input
    const phoneInput = document.querySelector("#phone_register");
    window.intlTelInput(phoneInput, {
        initialCountry: "ph", // Default to Philippines
        separateDialCode: true,
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js",
    });

    // 1. Toggle Password Visibility (Your Original Logic)
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }

    // 2. Show Validation Box on Focus
    function showValidation() {
        document.getElementById("validationBox").style.display = "block";
    }

    // 3. Password Strength & Match Checker
    function checkPassword() {
        const password = document.getElementById("regPass").value;
        const confirm = document.getElementById("confirmPass").value;
        const btn = document.getElementById("submitBtn");
        const matchError = document.getElementById("match-error");

        // RegEx Patterns
        const hasLength = password.length >= 8;
        const hasUpper = /[A-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

        // Update Rules UI
        updateRule("rule-length", hasLength);
        updateRule("rule-upper", hasUpper);
        updateRule("rule-number", hasNumber);
        updateRule("rule-special", hasSpecial);

        // Check if Passwords Match
        let isMatch = true;
        if(confirm.length > 0) {
            if(password !== confirm) {
                matchError.style.display = "block";
                isMatch = false;
            } else {
                matchError.style.display = "none";
                isMatch = true;
            }
        }

        // Enable Submit Button only if ALL valid
        if (hasLength && hasUpper && hasNumber && hasSpecial && isMatch && confirm.length > 0) {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
        } else {
            btn.disabled = true;
            btn.style.opacity = "0.6";
            btn.style.cursor = "not-allowed";
        }
    }

    function updateRule(id, isValid) {
        const item = document.getElementById(id);
        const icon = item.querySelector("i");
        if (isValid) {
            item.classList.add("valid");
            icon.style.color = "#2e7d32"; // Green
        } else {
            item.classList.remove("valid");
            icon.style.color = "#ccc"; // Grey
        }
    }
</script>

</body>
</html>
