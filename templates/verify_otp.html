<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | PrintSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f6f5f7; display: flex; justify-content: center; align-items: center; font-family: 'Alexandria', sans-serif; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 40px 50px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 400px; max-width: 90%; }
        h1 { color: #DC5500; margin-bottom: 10px; font-size: 28px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .email-highlight { font-weight: bold; color: #333; }
        
        /* Large OTP Input Style */
        .otp-input { 
            background-color: #f0f0f0; 
            border: 2px solid transparent; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 28px; 
            letter-spacing: 12px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .otp-input:focus { outline: none; border-color: #DC5500; background: #fff; }
        
        button { border-radius: 50px; border: none; background-color: #DC5500; color: #FFFFFF; font-size: 14px; font-weight: 700; padding: 15px 50px; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s;}
        button:hover { background-color: #b84700; }
        
        a { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 13px;}
        a:hover { color: #DC5500; text-decoration: underline; }

        /* Checkbox Styling */
        .checkbox-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 25px; font-size: 14px; color: #555; }
        .checkbox-wrapper input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; margin: 0;}
        .checkbox-wrapper label { cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Verify Email</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="padding: 15px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center;
                                background: {{ '#ffebee' if category == 'error' else '#e8f5e9' }}; 
                                color: {{ '#c62828' if category == 'error' else '#2e7d32' }};">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <p>We sent a 6-digit code to <br><span class="email-highlight">{{ email }}</span></p>
        
        <form action="/verify_otp" method="POST">
            <input type="text" name="otp" class="otp-input" placeholder="000000" maxlength="6" pattern="\d{6}" title="Please enter exactly 6 numbers" required autocomplete="off">
            
            <div class="checkbox-wrapper">
                <input type="checkbox" id="remember" name="remember_device" checked>
                <label for="remember">Remember this device for 30 days</label>
            </div>

            <button type="submit">Verify Account</button>
        </form>
        
        <a href="{{ url_for('login') }}">Back to Sign In</a>
    </div>
</body>
</html>
