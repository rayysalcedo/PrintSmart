{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    .success-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 20px;
    }
    .success-card {
        background: white;
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08); /* Slightly stronger shadow */
        text-align: center;
        width: 500px;
        max-width: 100%;
        border-top: 5px solid #DC5500; /* Orange top border for branding */
    }
    
    /* 2. Enhanced Checkmark Circle */
    .icon-circle {
        width: 90px;
        height: 90px;
        background: #e8f5e9; /* Pale Green Background */
        color: #2e7d32;      /* Dark Green Icon Color */
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 45px;
        margin: 0 auto 30px auto;
        border: 4px solid white;
        box-shadow: 0 5px 15px rgba(46, 125, 50, 0.2); /* Green glow shadow */
    }

    .success-card h1 { color: #333; margin: 0 0 10px 0; font-weight: 700; }
    .success-card p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
    
    .order-ref {
        background: #fff8e1; /* Pale Orange Background */
        padding: 15px;
        border-radius: 8px;
        font-weight: bold;
        color: #DC5500;
        margin-bottom: 30px;
        border: 1px dashed #DC5500;
        font-family: monospace;
        font-size: 18px;
    }

    .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    
    .btn-custom {
        padding: 14px 30px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        transition: 0.3s;
        cursor: pointer;
    }
    .btn-primary-custom { 
        background: #DC5500; 
        color: white; 
        border: 2px solid #DC5500; 
        box-shadow: 0 4px 10px rgba(220, 85, 0, 0.3);
    }
    .btn-primary-custom:hover { 
        background: #b84700; 
        border-color: #b84700;
        transform: translateY(-2px);
    }
    
    .btn-outline-custom { 
        background: transparent; 
        color: #666; 
        border: 2px solid #ddd; 
    }
    .btn-outline-custom:hover { 
        border-color: #333; 
        color: #333; 
        background: #f8f8f8;
    }
</style>

<div class="success-wrapper">
    <div class="success-card">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>Order Confirmed!</h1>
        <p>Thank you for shopping with Printagram. Your order has been placed successfully and is now pending processing.</p>
        
        <div class="order-ref">
            Order #{{ order_id }}
        </div>
        
        <div class="btn-group">
            <a href="/" class="btn-custom btn-outline-custom">Back to Home</a>
            <a href="/my_order_details/{{ order_id }}" class="btn-custom btn-primary-custom">View Receipt</a>
        </div>
    </div>
</div>
{% endblock %}
